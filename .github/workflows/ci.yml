name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install (CPU extras only -- no GPU runner)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,cli]"

      - name: Lint (ruff check)
        run: ruff check src tests examples benchmarks scripts

      - name: Lint (ruff format)
        run: ruff format --check src tests examples benchmarks scripts

      - name: Unit tests (pytest)
        run: pytest --cov=src/production_vlm --cov-report=term-missing --cov-report=xml

      - name: stdlib-only fallback verifier (no pytest dependency)
        run: python scripts/verify_no_pytest.py

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  smoke-run-examples:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,cli]"

      - name: Smoke-run vlm_chart_finetune (CPU fallback)
        run: timeout 120 python -m production_vlm.cli run-example vlm_chart_finetune

      - name: Smoke-run embedding_drift_active_learning
        run: timeout 60 python -m production_vlm.cli run-example embedding_drift_active_learning

      - name: Smoke-run vlm_edge_inference (synthetic-backbone fallback)
        run: timeout 60 python -m production_vlm.cli run-example vlm_edge_inference

      - name: Smoke-run vlm_robustness_guard
        run: timeout 180 python -m production_vlm.cli run-example vlm_robustness_guard

      - name: Verify all examples produced results.json
        run: |
          test -f outputs/vlm_chart_finetune/results.json
          test -f outputs/embedding_drift_active_learning/results.json
          test -f outputs/vlm_edge_inference/results.json
          test -f outputs/vlm_robustness_guard/results.json

      - name: Run unified benchmark and verify report generated
        run: |
          python benchmarks/run_all.py
          test -f benchmarks/reports/benchmark_report.md
          test -f benchmarks/reports/benchmark_report.json

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmarks/reports/

  docs-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install (dev extras for mkdocs)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,cli]"

      - name: Build docs
        run: mkdocs build --strict

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build CPU image
        run: docker build -f docker/Dockerfile -t production-vlm-engineering:ci .
      - name: Run container smoke test
        run: docker run --rm production-vlm-engineering:ci
