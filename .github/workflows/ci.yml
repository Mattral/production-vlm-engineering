name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package (CPU extras only -- no GPU runner available)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,cli]"

      - name: Lint (ruff)
        run: |
          ruff check src tests examples
          ruff format --check src tests examples

      - name: Unit tests
        run: pytest --cov=src/production_vlm --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  smoke-run-examples:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,cli]"

      - name: Smoke-run vlm_chart_finetune (CPU fallback)
        run: timeout 120 python -m production_vlm.cli run-example vlm_chart_finetune

      - name: Smoke-run embedding_drift_active_learning
        run: timeout 60 python -m production_vlm.cli run-example embedding_drift_active_learning

      - name: Smoke-run vlm_edge_inference (synthetic-backbone fallback)
        run: timeout 60 python -m production_vlm.cli run-example vlm_edge_inference

      - name: Verify each example produced a results.json
        run: |
          test -f outputs/vlm_chart_finetune/results.json
          test -f outputs/embedding_drift_active_learning/results.json
          test -f outputs/vlm_edge_inference/results.json

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build CPU image
        run: docker build -f docker/Dockerfile -t production-vlm-engineering:ci .
      - name: Run container smoke test
        run: docker run --rm production-vlm-engineering:ci
