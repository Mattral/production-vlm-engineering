name: vlm_edge_inference_benchmark

# This example benchmarks export/quantization mechanics on a small encoder
# model that's tractable to actually download+run in CI/CPU environments.
# Swap `model.checkpoint` for the VLM vision tower or full model from
# P0-02 (e.g. the Qwen2-VL checkpoint) once you have GPU + network access;
# the export/benchmark code path is identical.
model:
  checkpoint: "google/vit-base-patch16-224"
  checkpoint_pinned_date: "2026-03-01"
  task: "image-classification"   # used only to pick a sane dummy input shape; swap for the real VLM task

export:
  onnx_opset: 17
  dynamic_image_size: true
  output_dir: "outputs/vlm_edge_inference/onnx"

quantization:
  methods: ["fp32", "dynamic_int8"]   # "static_int8" requires a calibration set; documented but not run by default

benchmark:
  image_sizes: [224, 384]
  batch_sizes: [1, 4]
  n_warmup: 2
  n_timed_runs: 8
  num_eval_samples: 20   # synthetic chart-classification proxy task for accuracy-retention check

serving:
  host: "0.0.0.0"
  port: 8000
  max_batch_size: 8
  max_batch_wait_ms: 50

output_dir: "outputs/vlm_edge_inference"

# Component 2: memory-efficient decoding (KV-cache) analysis.
# Approximates a 7B-class VLM decoder (adjust to your checkpoint's config.json).
kv_cache:
  n_layers: 28
  n_query_heads: 28
  head_dim: 128
  n_kv_heads_gqa: 4            # typical GQA group size for 7B-class models
  sliding_window_size: 512     # tokens of local context retained
  image_sizes_for_visual_tokens: [224, 336, 448]  # patch_size=14 convention
  text_tokens_budget: 200      # approximate question + generated-answer token budget
